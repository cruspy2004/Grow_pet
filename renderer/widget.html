<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:; img-src 'self' data: file:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grow Pet Widget</title>
    <link rel="stylesheet" href="widget.css" />
  </head>
  <body>
    <main class="widget-shell" id="app">
      <section class="pet-shell" id="petShell">
        <img class="pet-standalone" id="petSprite" alt="" />

        <section class="controls hidden" id="controls">
          <div class="goal-strip">
            <div class="goal-name" id="goalName">No active goal</div>
            <div class="goal-meta" id="goalMeta">Open the panel to add a goal.</div>
          </div>

          <div class="bar-row">
            <img class="marker-sprite marker-sprite-top" id="idealSprite" alt="" />
            <div class="progress-bar" id="progressBar">
              <div class="ideal-line" id="idealLine"></div>
            </div>
            <img class="marker-sprite marker-sprite-bottom" id="actualSprite" alt="" />
          </div>

          <div class="action-row">
            <button class="step-button" id="addStepButton" type="button">+1</button>
            <button class="caret-button" id="caretButton" type="button" aria-label="Open correction menu">▾</button>
            <div class="dropdown hidden" id="dropdownMenu">
              <button class="dropdown-item" id="undoStepButton" type="button">-1</button>
            </div>
          </div>
        </section>
      </section>
    </main>
    <script src="shared.js"></script>
    <script src="widget.js"></script>
  </body>
</html>
